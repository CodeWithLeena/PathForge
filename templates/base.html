<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}PathForge — AI Career Roadmap Generator{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #05070f;
            --surface: #0d1117;
            --surface-2: #161b22;
            --border: rgba(255,255,255,0.07);
            --border-bright: rgba(255,255,255,0.15);
            --text: #e6edf3;
            --text-muted: #7d8590;
            --text-dim: #484f58;
            --accent: #00d4ff;
            --accent-2: #7c3aed;
            --accent-3: #f59e0b;
            --glow: rgba(0, 212, 255, 0.15);
            --glow-purple: rgba(124, 58, 237, 0.2);
            --gradient: linear-gradient(135deg, #00d4ff 0%, #7c3aed 100%);
            --font-display: 'Syne', sans-serif;
            --font-body: 'Inter', sans-serif;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        html { scroll-behavior: smooth; }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: var(--font-body);
            font-size: 15px;
            line-height: 1.6;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Grid bg */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(0,212,255,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,212,255,0.03) 1px, transparent 1px);
            background-size: 60px 60px;
            pointer-events: none;
            z-index: 0;
        }

        /* NAV */
        nav {
            position: fixed;
            top: 0; left: 0; right: 0;
            z-index: 100;
            padding: 0 2rem;
            height: 64px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(5,7,15,0.85);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
        }

        .nav-logo {
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            font-family: var(--font-display);
            font-weight: 800;
            font-size: 1.3rem;
            color: var(--text);
            letter-spacing: -0.02em;
        }

        .logo-icon {
            width: 32px; height: 32px;
            background: var(--gradient);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
        }

        .logo-dot {
            background: var(--gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .nav-links {
            display: flex;
            align-items: center;
            gap: 2rem;
            list-style: none;
        }

        .nav-links a {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.875rem;
            font-weight: 500;
            transition: color 0.2s;
        }

        .nav-links a:hover { color: var(--text); }

        .nav-cta {
            background: var(--gradient) !important;
            -webkit-background-clip: text !important;
            -webkit-text-fill-color: transparent !important;
            font-weight: 600 !important;
        }

        /* BUTTONS */
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 0.75rem 1.5rem;
            border-radius: 10px;
            font-family: var(--font-body);
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.2s;
            border: none;
        }

        .btn-primary {
            background: var(--gradient);
            color: #fff;
            box-shadow: 0 0 30px rgba(0,212,255,0.25);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 50px rgba(0,212,255,0.4);
        }

        .btn-outline {
            background: transparent;
            color: var(--text);
            border: 1px solid var(--border-bright);
        }

        .btn-outline:hover {
            background: var(--surface-2);
            border-color: var(--accent);
        }

        .btn-lg {
            padding: 1rem 2rem;
            font-size: 1rem;
            border-radius: 12px;
        }

        /* CARDS */
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 1.5rem;
            transition: border-color 0.3s, box-shadow 0.3s;
        }

        .card:hover {
            border-color: var(--border-bright);
            box-shadow: 0 8px 40px rgba(0,0,0,0.4);
        }

        /* BADGE */
        .badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 12px;
            border-radius: 100px;
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }

        .badge-cyan {
            background: rgba(0,212,255,0.1);
            color: var(--accent);
            border: 1px solid rgba(0,212,255,0.2);
        }

        .badge-purple {
            background: rgba(124,58,237,0.1);
            color: #a78bfa;
            border: 1px solid rgba(124,58,237,0.2);
        }

        .badge-amber {
            background: rgba(245,158,11,0.1);
            color: var(--accent-3);
            border: 1px solid rgba(245,158,11,0.2);
        }

        .badge-green {
            background: rgba(16,185,129,0.1);
            color: #34d399;
            border: 1px solid rgba(16,185,129,0.2);
        }

        /* SECTION */
        .section { padding: 6rem 2rem; position: relative; z-index: 1; }
        .container { max-width: 1200px; margin: 0 auto; }
        .container-sm { max-width: 800px; margin: 0 auto; }

        /* GRADIENT TEXT */
        .gradient-text {
            background: var(--gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* FOOTER */
        footer {
            padding: 3rem 2rem;
            border-top: 1px solid var(--border);
            text-align: center;
            color: var(--text-dim);
            font-size: 0.875rem;
            position: relative;
            z-index: 1;
        }

        footer a { color: var(--text-muted); text-decoration: none; }
        footer a:hover { color: var(--accent); }

        /* ANIMATIONS */
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes pulse-glow {
            0%, 100% { box-shadow: 0 0 30px rgba(0,212,255,0.2); }
            50% { box-shadow: 0 0 60px rgba(0,212,255,0.4); }
        }

        .fade-up { animation: fadeUp 0.6s ease forwards; }
        .fade-up-1 { animation-delay: 0.1s; opacity: 0; }
        .fade-up-2 { animation-delay: 0.2s; opacity: 0; }
        .fade-up-3 { animation-delay: 0.3s; opacity: 0; }
        .fade-up-4 { animation-delay: 0.4s; opacity: 0; }

        /* DIVIDER */
        .divider {
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--border-bright), transparent);
            margin: 2rem 0;
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: var(--surface-2); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--border-bright); }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>
    <nav>
        <a href="{% url 'home' %}" class="nav-logo">
            <div class="logo-icon">⚡</div>
            Path<span class="logo-dot">Forge</span>
        </a>
        <ul class="nav-links">
            <li><a href="{% url 'home' %}">Home</a></li>
            <li><a href="{% url 'explore' %}">Explore</a></li>
            <li><a href="{% url 'generate' %}" class="nav-cta">Build Roadmap →</a></li>
        </ul>
    </nav>

    <main style="padding-top: 64px;">
        {% block content %}{% endblock %}
    </main>

    <footer>
        <div class="container">
            <p style="margin-bottom: 0.5rem;">
                <a href="{% url 'home' %}"><strong style="color: var(--text);">PathForge</strong></a>
                &nbsp;·&nbsp; AI-Powered Career Roadmaps
            </p>
            <p>Built with Django &amp; Anthropic AI &nbsp;·&nbsp; © 2025 PathForge</p>
        </div>
    </footer>

    {% block extra_js %}{% endblock %}
</body>
</html>
